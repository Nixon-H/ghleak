name: Secret Scanning
on: [push, pull_request]
jobs:
  trufflehog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: TruffleHog OSS
        run: |
          docker run --rm -v "$PWD:/repo" \
            ghcr.io/trufflesecurity/trufflehog:latest \
            git file:///repo --since-commit HEAD --only-verified
